name: PR Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  quick-check:
    name: PR Quick Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.2"
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Run full test suite
        run: go test ./...

      - name: Run focused coverage checks
        run: go test -cover ./cmd/bytemind ./internal/agent ./internal/tools ./internal/provider
